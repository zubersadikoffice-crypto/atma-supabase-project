<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scheme Management System</title>
    <link rel="stylesheet" href="../static/css/login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-card">
        <h2>Sign In</h2>
        <p class="subtitle">Enter your official credentials</p>
        
        <div class="input-group">
            <label for="email">Official Email</label>
            <input type="email" id="email" placeholder="name@gmail.com" required autocomplete="email">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button id="loginBtn">Secure Login</button>

        <div class="footer-links">
            Don't have an account? <a href="{{ url_for('register_page') }}">Register here</a>
        </div>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/login.js"></script>
</body>
</html>
