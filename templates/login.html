<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Scheme Management System</title>
    <link rel="stylesheet" href="/static/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="main-container">
        <header class="brand-header">
            <h1 class="hero-title">SCHEME</h1>
            <p class="hero-subtitle">Management System</p>
        </header>

        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="instruction">Please enter your official credentials to continue</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Official Email" required autocomplete="email">
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>

                <button type="submit" id="loginBtn">Secure Login</button>
            </form>

            <div class="footer-links">
                New to the system? <a href="{{ url_for('register_page') }}">Create Account</a>
            </div>
        </div>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/login.js"></script>
</body>
</html>
