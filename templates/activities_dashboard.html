<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Manager | ATMA</title>
    <link rel="stylesheet" href="/static/css/activities_dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-content">
            <a href="{{ url_for('dashboard_page') }}" class="back-link">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <span class="page-title">Activity Manager</span>
            <a href="{{ url_for('add_activity_page') }}" class="add-btn-circle" title="Add New Activity">
                <i class="fa-solid fa-plus"></i>
            </a>
        </div>
    </nav>

    <main class="container">
        <section class="filter-card">
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Year</label>
                    <select id="fySelect"><option>Loading...</option></select>
                </div>
                <div class="filter-group">
                    <label>Scheme</label>
                    <select id="schemeSelect"><option>Loading...</option></select>
                </div>
                <button id="fetchBtn" class="refresh-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </section>

        <div class="list-card">
            <div class="card-header">
                <h3>Assigned Activities</h3>
                <span id="recordCount" class="badge">0 Total</span>
            </div>
            <div class="table-wrapper">
                <table id="activityTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Activity Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody">
                        <tr>
                            <td colspan="4" class="empty-state">Select parameters to load activities</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3>Are you sure?</h3>
            <p id="modalMsg">This action cannot be undone.</p>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Cancel</button>
                <button id="confirmBtn" class="btn-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/activities_dashboard.js"></script>
</body>
</html>
