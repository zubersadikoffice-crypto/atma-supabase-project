<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Manager</title>
    <link rel="stylesheet" href="/static/css/activity.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <nav class="top-nav">
        <div class="nav-content">
            <a href="{{ url_for('dashboard_page') }}" class="back-link">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <span class="page-title">Activity Manager</span>
            <div class="header-actions">
                <a href="{{ url_for('new_activity_page') }}" class="add-activity-btn" title="Add New Activity">
                    <i class="fa-solid fa-plus"></i>
                    <span class="btn-text">Add Activity</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="context-info-bar">
            <div class="context-label">
                <i class="fa-solid fa-filter"></i>
                <span>Showing Activities for: <strong id="activeContextText">Loading context...</strong></span>
            </div>
            <button id="refreshBtn" class="mini-refresh-btn"><i class="fa-solid fa-rotate"></i></button>
        </section>

        <div class="list-card">
            <div class="card-header">
                <h3>Assigned Activities</h3>
                <span id="recordCount" class="badge">0 Total</span>
            </div>
            <div class="table-wrapper">
                <table id="activityTable">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Activity Name</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody">
                        <tr>
                            <td colspan="4" class="empty-state">Loading activities...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3>Delete Activity?</h3>
            <p id="modalMsg">This action cannot be undone.</p>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Cancel</button>
                <button id="confirmBtn" class="btn-confirm">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/activity.js"></script>
</body>

</html>
