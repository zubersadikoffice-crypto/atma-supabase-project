<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ATMA System</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <nav class="top-nav">
        <div class="logo-area">
            <span class="portal-badge">ATMA</span>
            <span class="portal-name">Staff Portal</span>
        </div>
        <div class="user-controls">
            <a href="{{ url_for('manage_activity_page') }}" class="add-nav-btn">
                <i class="fa-solid fa-plus"></i>
                <span>Activity</span>
            </a>
            <div class="user-meta">
                <span id="welcomeText">Loading...</span>
                <small id="userEmail">---</small>
            </div>
            <button id="logoutBtn" class="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </nav>

    <main class="dashboard-content">
        <section class="selection-bar">
            <div class="input-box">
                <label><i class="fa-solid fa-calendar-days"></i> Academic Year</label>
                <select id="yearSelect">
                    <option disabled selected>Loading...</option>
                </select>
            </div>

            <div class="input-box">
                <label><i class="fa-solid fa-layer-group"></i> Active Scheme</label>
                <select id="schemeSelect">
                    <option disabled selected>Loading Assigned Schemes...</option>
                </select>
            </div>

            <button id="updateViewBtn" class="refresh-btn">
                <i class="fa-solid fa-arrows-rotate"></i> Update View
            </button>
        </section>

        <div class="display-card">
            <div class="card-header">
                <h3>Current View Summary</h3>
            </div>
            <div class="card-body">
                <p id="viewStatusText">Please select your working parameters above.</p>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>

</html>
