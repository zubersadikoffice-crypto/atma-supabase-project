<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ATMA System</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="logo-area">
            <span class="portal-badge">Scheme Portal</span>
        </div>

        <div class="context-switcher">
            <div class="input-group">
                <i class="fa-solid fa-calendar-days"></i>
                <select id="yearSelect">
                    <option disabled selected>Year...</option>
                </select>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-layer-group"></i>
                <select id="schemeSelect">
                    <option disabled selected>Scheme...</option>
                </select>
            </div>
        </div>

        <div class="user-controls">
            <a href="{{ url_for('activity_idea_page') }}" class="add-nav-btn">
                <span>Idea</span>
            </a>
            <a href="{{ url_for('activity_page') }}" class="add-nav-btn">
                <span>Activity</span>
            </a>
            <div class="user-meta">
                <span id="welcomeText">Loading...</span>
                <small id="userEmail">---</small>
            </div>
            <button id="logoutBtn" class="logout-btn" title="Logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
        
    </nav>

    <main class="dashboard-content">
        <div class="display-card">
            <div class="card-header">
                <h3>Current View Summary</h3>
            </div>
            <div class="card-body">
                <div id="viewStatusText" class="empty-state">
                    <i class="fa-solid fa-circle-info"></i>
                    <p>Select your working parameters in the top bar to view data.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
