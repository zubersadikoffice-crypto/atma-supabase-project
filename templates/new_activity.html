<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Activity | ATMA System</title>
    <link rel="stylesheet" href="/static/css/new_activity.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">
        <div class="activity-card">
            <div class="card-nav">
                <a href="{{ url_for('activity_page') }}" class="back-link">
                    <i class="fa-solid fa-chevron-left"></i> Back to Dashboard
                </a>
            </div>
            <div class="card-header">
                <i class="fa-solid fa-circle-plus gradient-icon"></i>
                <h2>New Activity</h2>
                <p>Register a new activity for the selected scheme</p>
            </div>

            <form id="activityForm">
                <div class="row">
                    <div class="input-group">
                        <label><i class="fa-solid fa-calendar-check"></i> Financial Year</label>
                        <select id="fySelect" required>
                            <option value="" disabled selected>Loading...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label><i class="fa-solid fa-layer-group"></i> Scheme</label>
                        <select id="schemeSelect" required>
                            <option value="" disabled selected>Loading...</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-fingerprint"></i> Activity ID / Code</label>
                    <input type="text" id="activityCode" placeholder="e.g. ACT-101" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-pen-nib"></i> Activity Name</label>
                    <input type="text" id="activityName" placeholder="Enter activity name" required>
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-align-left"></i> Description (Optional)</label>
                    <textarea id="description" rows="3" placeholder="Enter details..."></textarea>
                </div>

                <button type="submit" id="submitBtn">
                    <span id="btnText">Add Activity</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div id="responseMsg" class="message"></div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/new_activity.js"></script>
</body>

</html>
