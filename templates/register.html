<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Registration | Scheme Management</title>
    <link rel="stylesheet" href="/static/css/register.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-card">
        <h2>Registration</h2>
        <p class="subtitle">SCHEME Management System</p>
        
        <div class="input-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label for="email">Official Email</label>
            <input type="email" id="email" placeholder="name@gmail.com" required>
        </div>

        <div class="input-group">
            <label>Assigned Schemes</label>
            <div id="checkbox_container" class="scheme-checkbox-list">
                <p class="loading-text">Loading schemes...</p>
            </div>
            <div id="selection_count" class="selection-badge">0 Schemes Selected</div>
        </div>

        <div class="input-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" placeholder="Min. 6 characters" required>
        </div>

        <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Repeat password" required>
        </div>

        <button id="registerBtn">Create Account</button>

        <div class="footer-links">
            Already registered? <a href="{{ url_for('login_page') }}">Login here</a>
        </div>
    </div>

    <div id="statusOverlay" class="overlay" style="display:none;"></div>
    <div id="statusDialog" class="dialog-box" style="display:none;">
        <h3 id="dialogTitle">Status</h3>
        <p id="dialogMessage"></p>
        <button onclick="closeDialog()" class="dialog-btn">Okay</button>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
