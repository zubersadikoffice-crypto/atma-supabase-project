<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Scheme Management</title>
    <link rel="stylesheet" href="../static/css/register.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join the Scheme Management System</p>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@nic.in" required>
            </div>

            <div class="input-group">
                <label for="level">Administrative Level</label>
                <select id="level" required style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 4px;">
                    <option value="">-- Select Level --</option>
                    <option value="state">State</option>
                    <option value="division">Division</option>
                    <option value="district">District</option>
                    <option value="taluk">Taluk</option>
                </select>
            </div>

            <div class="input-group">
                <label for="unit_name">Unit/Location Name</label>
                <input type="text" id="unit_name" placeholder="e.g. Bangalore Urban or Mysore" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat password" required>
            </div>

            <button id="registerBtn" class="btn-primary">Sign Up</button>

            <div class="footer-links">
                Already have an account? <a href="{{ url_for('login_page') }}">Login here</a>
            </div>
        </div>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/register.js"></script>
</body>
</html>
