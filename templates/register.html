
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Scheme Management</title>
    <link rel="stylesheet" href="../static/css/register.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join the Scheme Management System</p>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" required>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your password" required>
            </div>

            <button id="registerBtn" class="btn-primary">Sign Up</button>

            <div class="footer-links">
                Already have an account? <a href="/templates/">Login here</a>
            </div>
        </div>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/register.js"></script>
</body>
</html>
