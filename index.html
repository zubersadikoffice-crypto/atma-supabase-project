<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Data from Supabase</h1>
    <pre id="output">Loading data...</pre>

    <script>
        // 2. Use 'db' instead of 'supabase' to avoid naming conflicts
        const SUPABASE_URL = 'https://ulsjekttfysnpyhxqyfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_j05auoMoV6KEAafNJoul_A_fco0XxaL';

        // Initialize the client
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function getData() {
            const { data, error } = await db
                .from('Blocks') // Change this to your actual table name
                .select('*');

            if (error) {
                document.getElementById('output').innerText = "Error: " + error.message;
            } else {
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            }
        }

        getData();
    </script>
</body>
</html>
