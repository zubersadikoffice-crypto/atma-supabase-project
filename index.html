<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Data from Supabase</h1>
        <pre id="output">Loading data...</pre>
    </div>

    <script>
        const SUPABASE_URL = 'https://ulsjekttfysnpyhxqyfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_j05auoMoV6KEAafNJoul_A_fco0XxaL';

        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function getData() {
            const { data, error } = await db
                .from('Blocks')
                .select('*');

            if (error) {
                document.getElementById('output').innerText = "Error: " + error.message;
                document.getElementById('output').style.color = "#dc2626"; // Red for errors
            } else {
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            }
        }

        getData();
    </script>
</body>
</html>
